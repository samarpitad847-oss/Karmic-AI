# ── Server ──────────────────────────────────────────────────────
server.port=8080

# ── Database (H2 in-memory for dev — swap to PostgreSQL for prod) ──
spring.datasource.url=jdbc:h2:mem:karmicdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 Console (dev only — disable in production)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Static resources (serve frontend) ───────────────────────────
spring.web.resources.static-locations=classpath:/static/,file:./frontend/
spring.mvc.static-path-pattern=/**

# ── JWT ─────────────────────────────────────────────────────────
# IMPORTANT: Override this in production via environment variable JWT_SECRET
jwt.secret=${JWT_SECRET:karmic-ai-dev-secret-CHANGE-IN-PRODUCTION-must-be-32-chars-min}

# ── Logging ─────────────────────────────────────────────────────
logging.level.com.karmicai=INFO
logging.level.org.springframework.security=WARN

# ── Privacy note ────────────────────────────────────────────────
# Raw check-in answers are never stored. Only computed burnout scores persist.
# Email addresses are SHA-256 hashed before storage.
# Admin endpoints expose aggregate data only (min 5 responses).
